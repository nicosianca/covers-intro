<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cover Intro · nsianca.music</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@300;600;900&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0a0a0a;--surface:#131313;--accent:#e8ff47;--accent2:#ff6b35;--text:#f0f0f0;--muted:#555}
  html,body{min-height:100dvh;background:var(--bg);font-family:'Space Mono',monospace;color:var(--text)}

  /* ── SETUP ── */
  #setup{min-height:100dvh;display:flex;flex-direction:column;padding:52px 22px 40px}
  .eyebrow{font-size:10px;letter-spacing:.3em;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
  h1{font-family:'Unbounded',sans-serif;font-weight:900;font-size:clamp(28px,8vw,38px);line-height:1.05;letter-spacing:-.02em;margin-bottom:36px}
  h1 span{color:var(--accent)}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:10px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
  .field input{width:100%;background:#141414;border:1.5px solid #222;border-radius:14px;padding:15px 16px;font-family:'Space Mono',monospace;font-size:15px;color:var(--text);outline:none;transition:border-color .2s;-webkit-appearance:none}
  .field input:focus{border-color:var(--accent)}
  .field input::placeholder{color:#2a2a2a}
  .search-row{display:flex;gap:10px;margin-bottom:16px}
  .search-row .field{flex:1;margin-bottom:0}
  #btn-search{background:var(--accent);color:#000;border:none;border-radius:14px;padding:0 18px;font-family:'Unbounded',sans-serif;font-weight:700;font-size:11px;cursor:pointer;white-space:nowrap;flex-shrink:0;-webkit-appearance:none;min-width:76px;display:flex;align-items:center;justify-content:center}

  #results-area{margin-bottom:16px;display:none}
  .results-label{font-size:10px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
  #results-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .result-card{border-radius:10px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .2s;position:relative;-webkit-tap-highlight-color:transparent}
  .result-card.selected{border-color:var(--accent)}
  .result-card img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
  .card-info{background:#131313;padding:6px}
  .card-title{font-family:'Unbounded',sans-serif;font-weight:600;font-size:8px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-artist{font-size:8px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .check-mark{position:absolute;top:5px;right:5px;width:20px;height:20px;background:var(--accent);border-radius:50%;display:none;align-items:center;justify-content:center}
  .result-card.selected .check-mark{display:flex}
  .check-mark svg{width:11px;height:11px;color:#000}

  .divider{height:1px;background:#1a1a1a;margin:4px 0 16px}
  .btn-generate{width:100%;background:var(--accent);color:#000;border:none;border-radius:16px;padding:20px;font-family:'Unbounded',sans-serif;font-weight:700;font-size:13px;letter-spacing:.04em;cursor:pointer;margin-top:auto;-webkit-appearance:none;display:flex;align-items:center;justify-content:center;gap:10px}
  .btn-generate svg{width:16px;height:16px}
  .status-msg{text-align:center;font-size:11px;color:var(--muted);margin-top:12px;min-height:16px;letter-spacing:.04em}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,.25);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── INTRO ── */
  #intro{display:none;position:fixed;inset:0;background:var(--bg);overflow:hidden}
  #intro::before{content:'';position:fixed;inset:0;z-index:100;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;opacity:.3}
  .bg-glow{position:absolute;width:70vw;height:70vw;border-radius:50%;background:radial-gradient(circle,rgba(232,255,71,.07) 0%,transparent 70%);top:35%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
  .scene{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 6vw;overflow-y:auto}

  .device{width:100%;max-width:420px;background:var(--surface);border-radius:26px;border:1.5px solid #1e1e1e;padding:26px 22px 22px;box-shadow:0 40px 100px rgba(0,0,0,.7);opacity:0;transform:translateY(50px) scale(.95);animation:slideUp .7s .4s cubic-bezier(.16,1,.3,1) forwards}
  @keyframes slideUp{to{opacity:1;transform:translateY(0) scale(1)}}

  .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
  .top-bar .label{font-family:'Unbounded',sans-serif;font-weight:300;font-size:10px;letter-spacing:.25em;color:var(--muted);text-transform:uppercase}
  .shuffle-badge{display:flex;align-items:center;gap:6px;background:var(--accent);color:#000;font-family:'Unbounded',sans-serif;font-weight:700;font-size:9px;letter-spacing:.1em;padding:5px 11px;border-radius:100px;opacity:0;animation:popIn .4s 1.3s cubic-bezier(.34,1.56,.64,1) forwards}
  @keyframes popIn{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
  .shuffle-badge svg{width:11px;height:11px}

  .album-wrap{position:relative;width:100%;aspect-ratio:1;border-radius:14px;overflow:hidden;margin-bottom:22px;background:#1a1a1a}
  #album-img{width:100%;height:100%;object-fit:cover;display:block}
  .vinyl-ring{position:absolute;inset:0;border-radius:14px;background:repeating-radial-gradient(circle at 50% 50%,transparent 0px,transparent 14px,rgba(255,255,255,.01) 14px,rgba(255,255,255,.01) 15px);animation:vinylSpin 8s linear infinite;opacity:0;animation-delay:1.1s;animation-fill-mode:forwards}
  @keyframes vinylSpin{0%{opacity:0;transform:rotate(0deg)}5%{opacity:1}100%{opacity:1;transform:rotate(360deg)}}

  .playing-dots{position:absolute;bottom:12px;right:12px;display:flex;gap:3px;align-items:flex-end;opacity:0;animation:fadeIn .4s 1.5s ease forwards}
  @keyframes fadeIn{to{opacity:1}}
  .dot{width:3px;background:var(--accent);border-radius:2px;animation:bounce .8s ease-in-out infinite alternate}
  .dot:nth-child(1){height:10px;animation-delay:0s}.dot:nth-child(2){height:18px;animation-delay:.15s}.dot:nth-child(3){height:13px;animation-delay:.3s}.dot:nth-child(4){height:22px;animation-delay:.1s}.dot:nth-child(5){height:15px;animation-delay:.25s}
  @keyframes bounce{from{transform:scaleY(.4)}to{transform:scaleY(1)}}

  .song-info{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
  #song-title-display{font-family:'Unbounded',sans-serif;font-weight:900;font-size:clamp(15px,4.2vw,21px);line-height:1.1;letter-spacing:-.02em;max-width:76%;opacity:0;transform:translateX(-16px);animation:slideRight .5s .9s ease forwards}
  @keyframes slideRight{to{opacity:1;transform:translateX(0)}}
  #song-artist-display{font-size:11px;color:var(--muted);margin-top:5px;opacity:0;animation:fadeIn .5s 1.1s ease forwards}
  .heart-btn{opacity:0;padding-top:3px;animation:popIn .4s 1.4s cubic-bezier(.34,1.56,.64,1) forwards}
  .heart-btn svg{width:20px;height:20px}

  .progress-wrap{margin-bottom:20px;opacity:0;animation:fadeIn .5s 1.2s ease forwards}
  .progress-track{width:100%;height:2px;background:#222;border-radius:10px;position:relative;margin-bottom:9px}
  .progress-fill{height:100%;background:var(--accent);border-radius:10px;width:0%;position:relative;animation:fillBar 2.5s 1.4s cubic-bezier(.4,0,.2,1) forwards}
  @keyframes fillBar{to{width:34%}}
  .progress-fill::after{content:'';position:absolute;right:-1px;top:50%;transform:translateY(-50%);width:10px;height:10px;background:#fff;border-radius:50%;box-shadow:0 0 0 2px var(--bg)}
  .time-row{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);letter-spacing:.05em}

  .controls{display:flex;justify-content:space-between;align-items:center;opacity:0;animation:fadeIn .5s 1.4s ease forwards}
  .ctrl-btn{width:42px;height:42px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
  .ctrl-btn svg{width:22px;height:22px}
  .play-btn{width:60px;height:60px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;animation:pulsePlay 2s 2s ease-in-out infinite}
  @keyframes pulsePlay{0%,100%{box-shadow:0 0 0 0 rgba(232,255,71,.4)}50%{box-shadow:0 0 0 14px rgba(232,255,71,0)}}
  .play-btn svg{width:24px;height:24px;color:#000;margin-left:3px}

  .creator-tag{margin-top:24px;text-align:center;opacity:0;animation:fadeIn .6s 2.0s ease forwards}
  #creator-handle{font-family:'Unbounded',sans-serif;font-weight:600;font-size:clamp(14px,4vw,19px);letter-spacing:.06em}
  .creator-sub{font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:.18em;text-transform:uppercase}
  .accent-line{width:32px;height:2px;background:var(--accent);margin:10px auto 0;opacity:0;transform:scaleX(0);animation:growLine .4s 2.3s ease forwards}
  @keyframes growLine{to{opacity:1;transform:scaleX(1)}}

  .back-btn{position:fixed;top:max(16px,env(safe-area-inset-top));left:16px;z-index:200;background:rgba(0,0,0,.65);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid #222;border-radius:100px;padding:8px 16px;font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);cursor:pointer;opacity:0;animation:fadeIn .4s 2.8s ease forwards}
</style>
</head>
<body>

<!-- ══ SETUP ══ -->
<div id="setup">
  <div class="eyebrow">nsianca.music</div>
  <h1>Hacé tu<br><span>intro.</span></h1>

  <div class="search-row">
    <div class="field">
      <label>Canción + Artista</label>
      <input id="search-input" type="text" placeholder="Still Feel Like Your Man John Mayer" autocomplete="off" />
    </div>
    <button id="btn-search" onclick="searchSong()">Buscar</button>
  </div>

  <div id="results-area">
    <div class="results-label">Seleccioná la portada</div>
    <div id="results-grid"></div>
  </div>

  <div class="divider"></div>

  <div class="field"><label>Tu usuario</label><input id="handle-input" type="text" placeholder="@nsianca.music" autocomplete="off" /></div>
  <div class="field"><label>Título de la canción</label><input id="title-input" type="text" placeholder="Still Feel Like Your Man" autocomplete="off" /></div>
  <div class="field"><label>Artista original</label><input id="artist-input" type="text" placeholder="John Mayer" autocomplete="off" /></div>
  <div class="field"><label>Duración</label><input id="duration-input" type="text" placeholder="3:54" autocomplete="off" /></div>

  <button class="btn-generate" onclick="generateIntro()">
    <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    Generar intro
  </button>
  <div class="status-msg" id="status"></div>
</div>

<!-- ══ INTRO ══ -->
<div id="intro">
  <div class="bg-glow"></div>
  <button class="back-btn" onclick="goBack()">← Editar</button>
  <div class="scene">
    <div class="device">
      <div class="top-bar">
        <span class="label">Now Playing</span>
        <div class="shuffle-badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="16 3 21 3 21 8"/><polyline points="4 20 21 3"/>
            <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
          </svg>
          SHUFFLE
        </div>
      </div>
      <div class="album-wrap">
        <img id="album-img" src="" alt="" crossorigin="anonymous" />
        <div class="vinyl-ring"></div>
        <div class="playing-dots">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
          <div class="dot"></div><div class="dot"></div>
        </div>
      </div>
      <div class="song-info">
        <div>
          <div id="song-title-display"></div>
          <div id="song-artist-display"></div>
        </div>
        <div class="heart-btn">
          <svg viewBox="0 0 24 24" fill="var(--accent2)" stroke="none">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-track"><div class="progress-fill"></div></div>
        <div class="time-row"><span id="time-current">1:12</span><span id="time-total">3:54</span></div>
      </div>
      <div class="controls">
        <div class="ctrl-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><polyline points="4 20 21 3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
        </div>
        <div class="ctrl-btn">
          <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/></svg>
        </div>
        <div class="play-btn">
          <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </div>
        <div class="ctrl-btn">
          <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/></svg>
        </div>
        <div class="ctrl-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="18" r="3"/><circle cx="16" cy="6" r="3"/><line x1="8" y1="15" x2="8" y2="11"/><line x1="16" y1="9" x2="16" y2="21"/><line x1="8" y1="11" x2="16" y2="9"/></svg>
        </div>
      </div>
    </div>
    <div class="creator-tag">
      <div id="creator-handle">@nsianca.music</div>
      <div class="creator-sub">covers · música</div>
      <div class="accent-line"></div>
    </div>
  </div>
</div>

<script>
let selectedArtwork = null;

async function searchSong() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;

  const btn = document.getElementById('btn-search');
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled = true;
  setStatus('Buscando...');

  try {
    const url = `https://itunes.apple.com/search?term=${encodeURIComponent(q)}&media=music&limit=6&country=AR`;
    const res  = await fetch(url);
    const data = await res.json();

    const grid = document.getElementById('results-grid');
    const area = document.getElementById('results-area');
    grid.innerHTML = '';
    selectedArtwork = null;

    if (!data.results?.length) {
      setStatus('Sin resultados. Probá con otro nombre.');
      area.style.display = 'none';
    } else {
      area.style.display = 'block';
      setStatus('');
      data.results.slice(0, 6).forEach((item, i) => {
        const thumb = item.artworkUrl100;
        const full  = thumb.replace('100x100bb', '600x600bb').replace('100x100', '600x600');
        const name  = item.trackName || item.collectionName || '';
        const card  = document.createElement('div');
        card.className = 'result-card';
        card.innerHTML = `
          <img src="${thumb}" loading="lazy" />
          <div class="card-info">
            <div class="card-title">${name}</div>
            <div class="card-artist">${item.artistName}</div>
          </div>
          <div class="check-mark">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
          </div>`;
        card.onclick = () => selectCard(card, full, name, item.artistName, item.trackTimeMillis);
        grid.appendChild(card);
        if (i === 0) selectCard(card, full, name, item.artistName, item.trackTimeMillis);
      });
    }
  } catch(e) {
    setStatus('Error de red. Revisá tu conexión.');
  }

  btn.innerHTML = 'Buscar';
  btn.disabled = false;
}

function selectCard(card, art, title, artist, ms) {
  document.querySelectorAll('.result-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
  selectedArtwork = art;
  if (!document.getElementById('title-input').value)  document.getElementById('title-input').value  = title;
  if (!document.getElementById('artist-input').value) document.getElementById('artist-input').value = artist;
  if (!document.getElementById('duration-input').value && ms) {
    const s = Math.round(ms / 1000);
    document.getElementById('duration-input').value = `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
  }
}

function generateIntro() {
  if (!selectedArtwork) { setStatus('Buscá y seleccioná una portada primero.'); return; }
  const handle = document.getElementById('handle-input').value.trim()   || '@nsianca.music';
  const title  = document.getElementById('title-input').value.trim()    || 'Song Title';
  const artist = document.getElementById('artist-input').value.trim()   || 'Artist';
  const dur    = document.getElementById('duration-input').value.trim() || '3:54';

  const parts = dur.split(':');
  const total = (parseInt(parts[0])||0)*60 + (parseInt(parts[1])||0);
  const cur   = Math.round(total * (0.28 + Math.random()*0.1));

  document.getElementById('album-img').src                  = selectedArtwork;
  document.getElementById('song-title-display').textContent = title;
  document.getElementById('song-artist-display').textContent= artist + ' · Cover';
  document.getElementById('creator-handle').textContent     = handle.startsWith('@') ? handle : '@'+handle;
  document.getElementById('time-current').textContent       = `${Math.floor(cur/60)}:${(cur%60).toString().padStart(2,'0')}`;
  document.getElementById('time-total').textContent         = dur;

  const intro = document.getElementById('intro');
  intro.style.display = 'none';
  void intro.offsetWidth;
  intro.style.display = 'block';
  document.getElementById('setup').style.display = 'none';
  document.body.style.overflow = 'hidden';
}

function goBack() {
  document.getElementById('intro').style.display  = 'none';
  document.getElementById('setup').style.display  = 'flex';
  document.body.style.overflow = '';
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }

document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchSong();
});
</script>
</body>
</html>
