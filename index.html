<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cover Intro · nsianca.music</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Circular+Std:wght@400;700;900&family=Inter:wght@400;500;600;700;900&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#121212;
    --surface:#181818;
    --surface2:#282828;
    --green:#1DB954;
    --green-dark:#158a3e;
    --text:#FFFFFF;
    --text2:#B3B3B3;
    --text3:#535353;
  }
  html,body{min-height:100dvh;background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased}

  /* ── SETUP ── */
  #setup{min-height:100dvh;display:flex;flex-direction:column;padding:56px 20px 40px;max-width:500px;margin:0 auto}

  .sp-logo{display:flex;align-items:center;gap:10px;margin-bottom:40px}
  .sp-logo svg{width:32px;height:32px;fill:var(--green)}
  .sp-logo span{font-size:22px;font-weight:700;letter-spacing:-.5px}

  .setup-title{font-size:28px;font-weight:900;letter-spacing:-.5px;margin-bottom:6px}
  .setup-sub{font-size:14px;color:var(--text2);margin-bottom:32px}

  .field{margin-bottom:14px}
  .field label{display:block;font-size:11px;font-weight:600;letter-spacing:.08em;color:var(--text2);text-transform:uppercase;margin-bottom:7px}
  .field input{
    width:100%;background:var(--surface2);border:none;border-radius:6px;
    padding:14px 16px;font-family:'Inter',sans-serif;font-size:15px;
    color:var(--text);outline:none;transition:box-shadow .15s;-webkit-appearance:none;
    -webkit-tap-highlight-color:transparent;
  }
  .field input:focus{box-shadow:inset 0 0 0 2px var(--green)}
  .field input::placeholder{color:var(--text3)}

  .search-row{display:flex;gap:10px;margin-bottom:14px}
  .search-row .field{flex:1;margin-bottom:0}
  #btn-search{
    background:var(--green);color:#000;border:none;border-radius:6px;
    padding:0 20px;font-family:'Inter',sans-serif;font-weight:700;
    font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0;
    -webkit-appearance:none;min-width:80px;
    display:flex;align-items:center;justify-content:center;gap:6px;
    -webkit-tap-highlight-color:transparent;
  }
  #btn-search:active{background:var(--green-dark)}

  #results-area{margin-bottom:14px;display:none}
  .results-label{font-size:11px;font-weight:600;letter-spacing:.08em;color:var(--text2);text-transform:uppercase;margin-bottom:10px}
  #results-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .result-card{border-radius:6px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .15s,transform .1s;position:relative;background:var(--surface2);-webkit-tap-highlight-color:transparent}
  .result-card:active{transform:scale(.97)}
  .result-card.selected{border-color:var(--green)}
  .result-card img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
  .card-info{padding:6px 7px 8px}
  .card-title{font-weight:600;font-size:9px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-artist{font-size:9px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .check-mark{position:absolute;top:5px;right:5px;width:20px;height:20px;background:var(--green);border-radius:50%;display:none;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.4)}
  .result-card.selected .check-mark{display:flex}
  .check-mark svg{width:11px;height:11px;color:#000}

  .sep{height:1px;background:var(--surface2);margin:6px 0 14px}

  .btn-generate{
    width:100%;background:var(--green);color:#000;border:none;border-radius:50px;
    padding:18px;font-family:'Inter',sans-serif;font-weight:700;font-size:15px;
    letter-spacing:.02em;cursor:pointer;margin-top:auto;-webkit-appearance:none;
    display:flex;align-items:center;justify-content:center;gap:10px;
    -webkit-tap-highlight-color:transparent;transition:transform .1s,background .15s;
  }
  .btn-generate:active{transform:scale(.98);background:var(--green-dark)}
  .btn-generate svg{width:18px;height:18px}
  .status-msg{text-align:center;font-size:12px;color:var(--text2);margin-top:12px;min-height:16px}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── INTRO SCREEN ── */
  #intro{display:none;position:fixed;inset:0;overflow:hidden}

  /* Gradient background that extracts from album art feel */
  .sp-backdrop{
    position:absolute;inset:0;
    background:linear-gradient(180deg, #1a3a2a 0%, #121212 60%);
    transition:background 0.5s;
  }

  /* Play animation overlay — shows first then fades */
  #play-overlay{
    position:absolute;inset:0;z-index:50;
    display:flex;align-items:center;justify-content:center;
    background:#000;
    animation:overlayFade 0.4s 1.2s ease forwards;
  }
  @keyframes overlayFade{to{opacity:0;pointer-events:none}}

  .play-ripple{
    position:relative;
    width:90px;height:90px;
    display:flex;align-items:center;justify-content:center;
  }
  .play-ripple::before,.play-ripple::after{
    content:'';position:absolute;border-radius:50%;
    border:2px solid var(--green);
    animation:ripple 1s ease-out infinite;
  }
  .play-ripple::after{animation-delay:.4s}
  @keyframes ripple{
    0%{width:70px;height:70px;opacity:1}
    100%{width:140px;height:140px;opacity:0}
  }
  .play-icon-big{
    width:70px;height:70px;background:var(--green);border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    animation:playPop .4s .1s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes playPop{from{transform:scale(0)}to{transform:scale(1)}}
  .play-icon-big svg{width:30px;height:30px;fill:#000;margin-left:4px}

  /* Spotify-style player */
  .sp-player{
    position:absolute;inset:0;
    display:flex;flex-direction:column;
    padding:0 24px;
    opacity:0;
    animation:fadeIn .5s 1.5s ease forwards;
  }
  @keyframes fadeIn{to{opacity:1}}

  /* top bar */
  .sp-topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding-top:max(56px, env(safe-area-inset-top, 56px));
    margin-bottom:24px;
  }
  .sp-topbar-center{text-align:center}
  .sp-topbar .playlist-from{font-size:11px;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px}
  .sp-topbar .playlist-name{font-size:14px;font-weight:700}
  .sp-chevron svg,.sp-dots svg{width:24px;height:24px;color:var(--text2)}

  /* artwork */
  .sp-artwork-wrap{
    flex:0 0 auto;
    width:100%;max-width:340px;
    margin:0 auto 28px;
    aspect-ratio:1;
    border-radius:6px;overflow:hidden;
    box-shadow:0 32px 64px rgba(0,0,0,.6);
    transform:scale(.94);
    animation:artworkGrow .6s 1.6s cubic-bezier(.16,1,.3,1) forwards;
  }
  @keyframes artworkGrow{to{transform:scale(1)}}
  .sp-artwork-wrap img{width:100%;height:100%;object-fit:cover;display:block}

  /* song info */
  .sp-info{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:10px;
    padding:0 2px;
  }
  .sp-info-left{}
  #sp-title{font-size:22px;font-weight:700;letter-spacing:-.3px;line-height:1.2}
  #sp-artist{font-size:14px;color:var(--text2);margin-top:3px}
  .sp-heart svg{width:24px;height:24px;fill:var(--green)}

  /* progress */
  .sp-progress{margin-bottom:16px;padding:0 2px}
  .sp-bar-track{
    width:100%;height:4px;background:var(--surface2);border-radius:10px;
    position:relative;margin-bottom:8px;cursor:pointer;
  }
  .sp-bar-fill{
    height:100%;background:var(--text);border-radius:10px;width:0%;
    position:relative;transition:background .2s;
    animation:barGrow 2s 1.8s ease forwards;
  }
  @keyframes barGrow{to{width:34%}}
  .sp-bar-track:hover .sp-bar-fill{background:var(--green)}
  .sp-bar-fill::after{
    content:'';position:absolute;right:-6px;top:50%;transform:translateY(-50%);
    width:12px;height:12px;background:#fff;border-radius:50%;
    opacity:0;transition:opacity .2s;
  }
  .sp-bar-track:hover .sp-bar-fill::after{opacity:1}
  .sp-times{display:flex;justify-content:space-between;font-size:11px;color:var(--text2)}

  /* controls */
  .sp-controls{
    display:flex;align-items:center;justify-content:space-between;
    padding:0 2px;margin-bottom:24px;
  }
  .sp-ctrl{
    width:44px;height:44px;display:flex;align-items:center;justify-content:center;
    color:var(--text2);cursor:pointer;-webkit-tap-highlight-color:transparent;
  }
  .sp-ctrl svg{width:24px;height:24px}
  .sp-ctrl.active svg{color:var(--green)}
  .sp-play-btn{
    width:56px;height:56px;border-radius:50%;background:var(--text);
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    -webkit-tap-highlight-color:transparent;transition:transform .1s;
  }
  .sp-play-btn:active{transform:scale(.95)}
  .sp-play-btn svg{width:24px;height:24px;fill:#000;margin-left:3px}

  /* volume */
  .sp-volume{display:flex;align-items:center;gap:10px;margin-bottom:28px;padding:0 2px}
  .sp-vol-icon svg{width:18px;height:18px;color:var(--text2)}
  .sp-vol-bar{flex:1;height:4px;background:var(--surface2);border-radius:10px;position:relative}
  .sp-vol-fill{height:100%;background:var(--text2);border-radius:10px;width:70%}

  /* bottom */
  .sp-bottom{
    display:flex;align-items:center;justify-content:space-between;
    padding:0 2px;padding-bottom:max(20px,env(safe-area-inset-bottom,20px));
  }
  .sp-device{display:flex;align-items:center;gap:8px;color:var(--green)}
  .sp-device svg{width:18px;height:18px}
  .sp-device span{font-size:12px;font-weight:600}
  .sp-queue svg{width:20px;height:20px;color:var(--text2)}

  /* handle tag */
  .sp-handle-tag{
    text-align:center;margin-bottom:16px;
    opacity:0;animation:fadeIn .5s 2.2s ease forwards;
  }
  .sp-handle-tag span{
    font-size:13px;font-weight:600;color:var(--text2);letter-spacing:.04em;
  }
  .sp-handle-tag .htag{color:var(--text)}

  .back-btn{
    position:fixed;top:max(16px,env(safe-area-inset-top));left:16px;z-index:200;
    background:rgba(0,0,0,.5);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border:1px solid #333;border-radius:100px;padding:7px 14px;
    font-size:12px;color:var(--text2);cursor:pointer;
    opacity:0;animation:fadeIn .4s 3s ease forwards;
    -webkit-tap-highlight-color:transparent;
  }
</style>
</head>
<body>

<!-- ══ SETUP ══ -->
<div id="setup">
  <div class="sp-logo">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
    <span>nsianca.music</span>
  </div>

  <div class="setup-title">Generá tu intro</div>
  <div class="setup-sub">Buscá la canción y creá la pantalla de Now Playing</div>

  <div class="search-row">
    <div class="field">
      <label>Canción + Artista</label>
      <input id="search-input" type="text" placeholder="Still Feel Like Your Man John Mayer" autocomplete="off" />
    </div>
    <button id="btn-search" onclick="searchSong()">
      <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" stroke="currentColor" stroke-width="2" fill="none"/></svg>
      Buscar
    </button>
  </div>

  <div id="results-area">
    <div class="results-label">Seleccioná la portada</div>
    <div id="results-grid"></div>
  </div>

  <div class="sep"></div>

  <div class="field"><label>Tu usuario</label><input id="handle-input" type="text" placeholder="@nsianca.music" autocomplete="off" /></div>
  <div class="field"><label>Título de la canción</label><input id="title-input" type="text" placeholder="Still Feel Like Your Man" autocomplete="off" /></div>
  <div class="field"><label>Artista original</label><input id="artist-input" type="text" placeholder="John Mayer" autocomplete="off" /></div>
  <div class="field"><label>Duración</label><input id="duration-input" type="text" placeholder="3:54" autocomplete="off" /></div>

  <button class="btn-generate" onclick="generateIntro()">
    <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    Generar intro
  </button>
  <div class="status-msg" id="status"></div>
</div>

<!-- ══ INTRO ══ -->
<div id="intro">
  <div class="sp-backdrop" id="sp-backdrop"></div>

  <!-- Play animation que aparece primero -->
  <div id="play-overlay">
    <div class="play-ripple">
      <div class="play-icon-big">
        <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </div>
    </div>
  </div>

  <button class="back-btn" onclick="goBack()">← Editar</button>

  <div class="sp-player">
    <!-- Top bar -->
    <div class="sp-topbar">
      <div class="sp-chevron">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
      </div>
      <div class="sp-topbar-center">
        <div class="playlist-from">Reproduciendo desde</div>
        <div class="playlist-name">Tus me gusta</div>
      </div>
      <div class="sp-dots">
        <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
      </div>
    </div>

    <!-- Artwork -->
    <div class="sp-artwork-wrap">
      <img id="sp-album-img" src="" alt="" />
    </div>

    <!-- Song info -->
    <div class="sp-info">
      <div class="sp-info-left">
        <div id="sp-title">Still Feel Like Your Man</div>
        <div id="sp-artist">John Mayer · Cover</div>
      </div>
      <div class="sp-heart">
        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </div>
    </div>

    <!-- Progress -->
    <div class="sp-progress">
      <div class="sp-bar-track">
        <div class="sp-bar-fill" id="sp-bar"></div>
      </div>
      <div class="sp-times">
        <span id="sp-current">1:12</span>
        <span id="sp-total">3:54</span>
      </div>
    </div>

    <!-- Controls -->
    <div class="sp-controls">
      <div class="sp-ctrl active">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 4l3 3-3 3M6 20l-3-3 3-3M21 7H3M21 17H9"/></svg>
      </div>
      <div class="sp-ctrl">
        <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2" fill="none"/></svg>
      </div>

</div>

<script>
let selectedArtwork = null;
let _jsonpTimer = null;

function searchSong() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;

  const btn = document.getElementById('btn-search');
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled = true;
  setStatus('Buscando...');

  // Limpiar script y timer anteriores
  const old = document.getElementById('_itunes_jsonp');
  if (old) old.remove();
  if (_jsonpTimer) clearTimeout(_jsonpTimer);

  // Callback global
  window.__itunesCallback = function(data) {
    clearTimeout(_jsonpTimer);
    const s = document.getElementById('_itunes_jsonp');
    if (s) s.remove();

    btn.innerHTML = 'Buscar';
    btn.disabled = false;

    const grid = document.getElementById('results-grid');
    const area = document.getElementById('results-area');
    grid.innerHTML = '';
    selectedArtwork = null;

    if (!data.results || data.results.length === 0) {
      setStatus('Sin resultados. Probá con otro nombre.');
      area.style.display = 'none';
      return;
    }

    area.style.display = 'block';
    setStatus('');

    data.results.slice(0, 6).forEach((item, i) => {
      const thumb = item.artworkUrl100;
      const full  = thumb.replace('100x100bb','600x600bb').replace('100x100','600x600');
      const name  = item.trackName || item.collectionName || '';
      const card  = document.createElement('div');
      card.className = 'result-card';
      card.innerHTML = `
        <img src="${thumb}" loading="lazy" />
        <div class="card-info">
          <div class="card-title">${name}</div>
          <div class="card-artist">${item.artistName}</div>
        </div>
        <div class="check-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </div>`;
      card.onclick = () => selectCard(card, full, name, item.artistName, item.trackTimeMillis);
      grid.appendChild(card);
      if (i === 0) selectCard(card, full, name, item.artistName, item.trackTimeMillis);
    });
  };

  // Timeout de seguridad
  _jsonpTimer = setTimeout(() => {
    const s = document.getElementById('_itunes_jsonp');
    if (s) s.remove();
    btn.innerHTML = 'Buscar';
    btn.disabled = false;
    setStatus('Sin respuesta. Revisá tu conexión.');
  }, 8000);

  // Inyectar script JSONP — no tiene restricciones CORS
  const script = document.createElement('script');
  script.id = '_itunes_jsonp';
  script.onerror = () => {
    clearTimeout(_jsonpTimer);
    btn.innerHTML = 'Buscar';
    btn.disabled = false;
    setStatus('Error de red.');
    script.remove();
  };
  script.src = 'https://itunes.apple.com/search?term=' + encodeURIComponent(q) + '&media=music&limit=6&country=AR&callback=__itunesCallback';
  document.head.appendChild(script);
}

function selectCard(card, art, title, artist, ms) {
  document.querySelectorAll('.result-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
  selectedArtwork = art;
  if (!document.getElementById('title-input').value)  document.getElementById('title-input').value  = title;
  if (!document.getElementById('artist-input').value) document.getElementById('artist-input').value = artist;
  if (!document.getElementById('duration-input').value && ms) {
    const s = Math.round(ms/1000);
    document.getElementById('duration-input').value = `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
  }
}

function generateIntro() {
  if (!selectedArtwork) { setStatus('Buscá y seleccioná una portada primero.'); return; }

  const handle = document.getElementById('handle-input').value.trim()   || '@nsianca.music';
  const title  = document.getElementById('title-input').value.trim()    || 'Song Title';
  const artist = document.getElementById('artist-input').value.trim()   || 'Artist';
  const dur    = document.getElementById('duration-input').value.trim() || '3:54';

  const parts = dur.split(':');
  const total = (parseInt(parts[0])||0)*60 + (parseInt(parts[1])||0);
  const cur   = Math.round(total * (0.28 + Math.random()*0.1));

  document.getElementById('sp-album-img').src   = selectedArtwork;
  document.getElementById('sp-title').textContent  = title;
  document.getElementById('sp-artist').textContent = artist + ' · Cover';
  document.getElementById('sp-handle').textContent = handle.startsWith('@') ? handle : '@'+handle;
  document.getElementById('sp-current').textContent= `${Math.floor(cur/60)}:${(cur%60).toString().padStart(2,'0')}`;
  document.getElementById('sp-total').textContent  = dur;

  // Reset animations
  const intro = document.getElementById('intro');
  intro.style.display = 'none';
  void intro.offsetWidth;
  intro.style.display = 'block';
  document.getElementById('setup').style.display = 'none';
  document.body.style.overflow = 'hidden';
}

function goBack() {
  document.getElementById('intro').style.display  = 'none';
  document.getElementById('setup').style.display  = 'flex';
  document.body.style.overflow = '';
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }

document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchSong();
});
</script>
</body>
</html>
